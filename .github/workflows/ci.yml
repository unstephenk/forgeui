name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Versions
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci

      - name: Audit (high+ only)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: NPM pack smoke test
        shell: bash
        run: |
          set -euo pipefail
          npm pack --silent
          TARBALL=$(ls -1 *.tgz | head -n 1)
          mkdir -p /tmp/forgeui-packtest
          cd /tmp/forgeui-packtest
          npm init -y >/dev/null
          npm i "${GITHUB_WORKSPACE}/${TARBALL}" >/dev/null
          node -e "require('@forgeui/cli')" >/dev/null
          npx forgeui --help >/dev/null

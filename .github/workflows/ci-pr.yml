name: CI (PR)

on:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Versions
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci

      - name: Audit (high+ only)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docs_site:
    name: Docs site build (PR-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install
        working-directory: docs-site
        run: npm ci

      - name: Build
        working-directory: docs-site
        env:
          VITEPRESS_BASE: /forgeui/
        run: npm run build

      - name: Verify dist
        run: node scripts/verify-docs-dist.mjs docs-site/.vitepress/dist /forgeui/
